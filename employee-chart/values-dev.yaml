# DEV specific values
# Overrides values.yaml defaults

environment: development
replicaCount: 1

config:
  APP_ENV: "development"
  LOG_LEVEL: "DEBUG"
  APP_MESSAGE: "Welcome to DEV"
  MAX_CONNECTIONS: "10"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  cpuUtilization: 70
