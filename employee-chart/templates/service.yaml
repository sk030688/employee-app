apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}-{{ .Values.environment }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.appName }}
    environment: {{ .Values.environment }}
spec:
  selector:
    app: {{ .Values.appName }}-{{ .Values.environment }}
  ports:
  - protocol: TCP
    port: {{ .Values.port }}
    targetPort: {{ .Values.port }}
  type: ClusterIP
