# ─── Default Values ───────────────────────

# Application name
appName: employee-app

# Environment name
environment: development

# Image settings
image:
  repository: image-registry.openshift-image-registry.svc:5000/sabbavarapusatishkum-dev/employee-app
  tag: latest
  pullPolicy: Always

# Replica count
replicaCount: 1

# Port
port: 9090

# Namespace
namespace: sabbavarapusatishkum-dev

# Resource limits
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# ConfigMap data
config:
  APP_ENV: "development"
  LOG_LEVEL: "DEBUG"
  APP_VERSION: "1.0.0"
  APP_MESSAGE: "Welcome to Employee App"
  MAX_CONNECTIONS: "10"

# HPA settings
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  cpuUtilization: 70

# Health probe settings
probes:
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 30
    periodSeconds: 5
    failureThreshold: 3
